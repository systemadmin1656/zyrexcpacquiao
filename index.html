<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mayor Zyrex C. Pacquiao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#031b1b,#005f46,#00c853);
overflow:hidden;
position:relative;
padding:20px;
}

/* =========================
LOADING SCREEN
========================= */

.loader{
position:fixed;
inset:0;
background:#021414;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hideLoader 1s ease 3s forwards;
}

.loader-logo{
width:190px;
height:190px;
display:flex;
justify-content:center;
align-items:center;
animation:heartbeat 1.4s infinite;
}

.loader-logo img{
width:100%;
height:100%;
object-fit:contain;

filter:
drop-shadow(0 0 15px #00ff99)
drop-shadow(0 0 35px #00ff99);
}

.loader-text{
margin-top:25px;
font-size:20px;
font-weight:800;
color:white;
letter-spacing:2px;
text-align:center;
animation:pulseText 1.5s infinite alternate;
}

/* HEARTBEAT */

@keyframes heartbeat{

0%{
transform:scale(1);
}

25%{
transform:scale(1.06);
}

40%{
transform:scale(1);
}

60%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes pulseText{
from{
opacity:0.6;
}
to{
opacity:1;
}
}

@keyframes hideLoader{
to{
opacity:0;
visibility:hidden;
}
}

/* =========================
BACKGROUND EFFECTS
========================= */

.bg1,
.bg2,
.bg3{
position:absolute;
border-radius:50%;
filter:blur(100px);
animation:float 10s infinite alternate;
}

.bg1{
width:350px;
height:350px;
background:#00ff99;
top:-120px;
left:-120px;
opacity:0.2;
}

.bg2{
width:300px;
height:300px;
background:#00c853;
bottom:-100px;
right:-100px;
opacity:0.2;
animation-delay:2s;
}

.bg3{
width:250px;
height:250px;
background:#69f0ae;
top:20%;
right:35%;
opacity:0.15;
animation-delay:4s;
}

@keyframes float{
from{
transform:translateY(0px);
}
to{
transform:translateY(40px);
}
}

/* =========================
CARD
========================= */

.card{
position:relative;
width:390px;
max-width:100%;
padding:35px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.15);
border-radius:35px;
box-shadow:0 10px 50px rgba(0,0,0,0.5);
text-align:center;
color:white;
z-index:10;
overflow:hidden;
animation:fadeIn 1.5s ease;
}

.card::before{
content:'';
position:absolute;
inset:0;
border-radius:35px;
padding:2px;
background:linear-gradient(
45deg,
#00ff99,
transparent,
#00ff99
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

opacity:0.5;

pointer-events:none;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* =========================
PROFILE
========================= */

.profile{
width:150px;
height:150px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:4px solid #00ff99;
box-shadow:0 0 30px #00ff99;
position:relative;
animation:glow 2s infinite alternate;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes glow{
from{
box-shadow:0 0 15px #00ff99;
}
to{
box-shadow:0 0 45px #00ff99;
}
}

.online{
width:20px;
height:20px;
background:#00ff99;
border-radius:50%;
position:absolute;
right:10px;
bottom:12px;
border:3px solid white;
}

/* =========================
TEXT
========================= */

h1{
font-size:38px;
margin-top:20px;
font-weight:800;
line-height:1.2;
}

.role{
margin-top:10px;
font-size:15px;
opacity:0.85;
margin-bottom:20px;
}

.tagline{
font-size:13px;
opacity:0.75;
margin-bottom:25px;
}

/* =========================
BUTTONS
========================= */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
text-decoration:none;
padding:15px;
margin:12px 0;
border-radius:18px;
font-weight:600;
font-size:15px;
color:white;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
transition:0.35s ease;
position:relative;
z-index:99;
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
background:#00c853;
box-shadow:0 0 20px #00ff99;
}

.btn i{
font-size:17px;
}

/* =========================
FOOTER
========================= */

.footer{
margin-top:28px;
font-size:12px;
line-height:1.7;
opacity:0.75;
}

/* =========================
MOBILE RESPONSIVE
========================= */

@media(max-width:480px){

body{
padding:20px;
overflow:auto;
}

.card{
width:100%;
padding:25px;
border-radius:28px;
}

.profile{
width:120px;
height:120px;
}

h1{
font-size:32px;
line-height:1.2;
}

.role{
font-size:13px;
}

.tagline{
font-size:12px;
}

.btn{
padding:14px;
font-size:14px;
border-radius:15px;
}

.footer{
font-size:11px;
}

.loader-logo{
width:140px;
height:140px;
}

.loader-text{
font-size:15px;
letter-spacing:1px;
padding:0 15px;
}

.bg1,
.bg2,
.bg3{
filter:blur(70px);
}

}

</style>
</head>

<body>

<!-- =========================
LOADER
========================= -->

<div class="loader">

<div class="loader-logo">
<img src="logo.png" alt="Zerbisyong Panigurado Logo">
</div>

<div class="loader-text">
ZERBISYONG PANIGURADO
</div>

</div>

<!-- =========================
BACKGROUND EFFECTS
========================= -->

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<!-- =========================
MAIN CARD
========================= -->

<div class="card">

<div class="profile">

<img src="profile.jpg" alt="Mayor Zyrex">

<div class="online"></div>

</div>

<h1>
Mayor Zyrex C.<br>
Pacquiao
</h1>

<div class="role">
Public Servant • Community Leader
</div>

<div class="tagline">
Leadership With Vision And Service
</div>

<a href="tel:+639000000000" class="btn">
<i class="fa-solid fa-phone"></i>
Call Mayor
</a>

<a href="https://facebook.com" class="btn" target="_blank">
<i class="fa-brands fa-facebook-f"></i>
Facebook Page
</a>

<a href="https://m.me" class="btn" target="_blank">
<i class="fa-brands fa-facebook-messenger"></i>
Messenger
</a>

<a href="mailto:office@example.com" class="btn">
<i class="fa-solid fa-envelope"></i>
Email Office
</a>

<a href="vcard.vcf" class="btn">
<i class="fa-solid fa-download"></i>
Save Contact
</a>

<div class="footer">
Official Digital Contact Card<br>
Mayor Zyrex C. Pacquiao
</div>

</div>

</body>
</html>
