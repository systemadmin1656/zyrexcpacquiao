<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mayor Zyrex C. Pacquiao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#00695c,#00c853);
overflow:hidden;
position:relative;
}

/* Floating Glow Background */

body::before,
body::after{
content:'';
position:absolute;
width:400px;
height:400px;
border-radius:50%;
background:rgba(0,255,150,0.15);
filter:blur(100px);
animation:float 8s infinite alternate;
}

body::before{
top:-100px;
left:-100px;
}

body::after{
bottom:-100px;
right:-100px;
}

@keyframes float{
from{
transform:translateY(0px);
}
to{
transform:translateY(40px);
}
}

/* Card */

.card{
position:relative;
width:360px;
padding:35px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
color:white;
animation:fadeIn 1.3s ease;
z-index:2;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Profile */

.profile{
width:135px;
height:135px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid #00ff99;
box-shadow:0 0 30px #00ff99;
animation:glow 2s infinite alternate;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes glow{
from{
box-shadow:0 0 15px #00ff99;
}
to{
box-shadow:0 0 35px #00ff99;
}
}

/* Text */

h1{
margin-top:20px;
font-size:28px;
font-weight:700;
}

.role{
font-size:14px;
opacity:0.8;
margin-top:5px;
margin-bottom:25px;
}

/* Buttons */

.btn{
display:block;
text-decoration:none;
padding:14px;
margin:12px 0;
border-radius:15px;
font-weight:600;
color:white;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px) scale(1.03);
background:#00c853;
box-shadow:0 0 20px #00ff99;
}

/* Footer */

.footer{
margin-top:25px;
font-size:12px;
opacity:0.7;
line-height:1.6;
}

</style>
</head>

<body>

<div class="card">

<div class="profile">
<img src="profile.jpeg" alt="Mayor">
</div>

<h1>Mayor Zyrex C. Pacquiao</h1>

<div class="role">
Public Servant • Community Leader
</div>

<a href="tel:+639000000000" class="btn">
📞 Call Mayor
</a>

<a href="#" class="btn">
🌐 Facebook Page
</a>

<a href="#" class="btn">
💬 Messenger
</a>

<a href="#" class="btn">
📧 Email Office
</a>

<a href="vcard.vcf" class="btn">
⬇ Save Contact
</a>

<div class="footer">
Leadership With Vision And Service
</div>

</div>

</body>
</html>
