<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mayor Zyrex C. Pacquiao</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

/* =========================
BODY
========================= */

body{
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
135deg,
#021414,
#014737,
#00b85c
);

position:relative;
padding:20px;
overflow:hidden;
}

/* =========================
BACKGROUND GLOW
========================= */

.bg1,
.bg2,
.bg3{
position:absolute;
border-radius:50%;
filter:blur(90px);
animation:float 10s infinite alternate;
pointer-events:none;
}

.bg1{
width:300px;
height:300px;
background:#00ff99;
top:-120px;
left:-120px;
opacity:0.18;
}

.bg2{
width:250px;
height:250px;
background:#00c853;
bottom:-100px;
right:-100px;
opacity:0.18;
animation-delay:2s;
}

.bg3{
width:220px;
height:220px;
background:#69f0ae;
top:35%;
right:20%;
opacity:0.12;
animation-delay:4s;
}

@keyframes float{
from{
transform:translateY(0px);
}
to{
transform:translateY(40px);
}
}

/* =========================
LOADER
========================= */

.loader{
position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:#021414;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

gap:18px;

z-index:99999;

animation:hideLoader 0.8s ease 2.2s forwards;

overflow:hidden;
}

.loader-logo{
width:110px;
height:110px;

display:flex;
justify-content:center;
align-items:center;

animation:heartbeat 1.2s infinite;
}

.loader-logo img{
width:100%;
height:100%;
object-fit:contain;

filter:
drop-shadow(0 0 15px #00ff99)
drop-shadow(0 0 35px #00ff99);
}

.loader-text{
font-size:16px;
font-weight:800;
letter-spacing:2px;
color:white;
text-align:center;

animation:pulseText 1.5s infinite alternate;
}

@keyframes heartbeat{

0%{
transform:scale(1);
}

25%{
transform:scale(1.06);
}

40%{
transform:scale(1);
}

60%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

@keyframes pulseText{
from{
opacity:0.6;
}
to{
opacity:1;
}
}

@keyframes hideLoader{
to{
opacity:0;
visibility:hidden;
pointer-events:none;
}
}

/* =========================
CARD
========================= */

.card{
position:relative;

width:390px;
max-width:100%;

padding:35px;

border-radius:35px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 10px 50px rgba(0,0,0,0.45);

text-align:center;

color:white;

overflow:hidden;

z-index:10;

animation:fadeIn 1.2s ease;
}

.card::before{
content:'';

position:absolute;
inset:0;

border-radius:35px;

padding:2px;

background:
linear-gradient(
45deg,
#00ff99,
transparent,
#00ff99
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

opacity:0.5;
pointer-events:none;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* =========================
PROFILE
========================= */

.profile{
width:145px;
height:145px;

margin:auto;

border-radius:50%;
overflow:hidden;

border:4px solid #00ff99;

box-shadow:0 0 30px #00ff99;

position:relative;

animation:glow 2s infinite alternate;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.online{
width:20px;
height:20px;

background:#00ff99;

border-radius:50%;

position:absolute;

right:10px;
bottom:12px;

border:3px solid white;
}

@keyframes glow{
from{
box-shadow:0 0 15px #00ff99;
}
to{
box-shadow:0 0 40px #00ff99;
}
}

/* =========================
TEXT
========================= */

h1{
font-size:42px;
font-weight:800;
line-height:1.15;

margin-top:20px;
}

.role{
font-size:15px;
opacity:0.88;

margin-top:12px;
margin-bottom:18px;
}

.tagline{
font-size:13px;
opacity:0.75;

margin-bottom:28px;
}

/* =========================
BUTTONS
========================= */

.btn{
display:flex;
justify-content:center;
align-items:center;
gap:12px;

width:100%;

padding:15px;

margin:12px 0;

border-radius:18px;

text-decoration:none;

font-weight:600;
font-size:15px;

color:white;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.12);

transition:0.35s ease;

cursor:pointer;

-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

.btn i{
font-size:17px;
}

.btn:hover{
transform:translateY(-4px) scale(1.02);

background:#00c853;

box-shadow:0 0 20px #00ff99;
}

.btn:active{
transform:scale(0.96);
}

/* =========================
FOOTER
========================= */

.footer{
margin-top:26px;

font-size:12px;

line-height:1.7;

opacity:0.75;
}

/* =========================
MOBILE
========================= */

@media(max-width:480px){

body{
padding:14px;
}

.card{

width:100%;
max-width:360px;

max-height:95vh;

overflow-y:auto;

padding:22px;

border-radius:28px;

scrollbar-width:none;
}

.card::-webkit-scrollbar{
display:none;
}

.profile{
width:105px;
height:105px;
border-width:3px;
}

h1{
font-size:24px;
line-height:1.2;
margin-top:16px;
}

.role{
font-size:12px;
margin-top:8px;
margin-bottom:14px;
}

.tagline{
font-size:11px;
margin-bottom:18px;
}

.btn{
padding:13px;
font-size:14px;
border-radius:14px;
margin:10px 0;
gap:10px;
}

.btn i{
font-size:15px;
}

.footer{
font-size:10px;
margin-top:18px;
line-height:1.6;
}

.loader{
padding:20px;
}

.loader-logo{
width:90px;
height:90px;
}

.loader-text{
font-size:12px;
letter-spacing:1px;
}

.bg1,
.bg2,
.bg3{
filter:blur(60px);
}

}

</style>
</head>

<body>

<!-- =========================
LOADER
========================= -->

<div class="loader">

<div class="loader-logo">
<img src="logo.png" alt="Logo">
</div>

<div class="loader-text">
ZERBISYONG PANIGURADO
</div>

</div>

<!-- =========================
BACKGROUND
========================= -->

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<!-- =========================
CARD
========================= -->

<div class="card">

<div class="profile">

<img src="profile.jpg" alt="Mayor Zyrex">

<div class="online"></div>

</div>

<h1>
Mayor Zyrex C.<br>
Pacquiao
</h1>

<div class="role">
Public Servant • Community Leader
</div>

<div class="tagline">
Leadership With Vision And Service
</div>

<a href="tel:+639000000000" class="btn">
<i class="fa-solid fa-phone"></i>
Call Mayor
</a>

<a href="https://facebook.com" class="btn" target="_blank">
<i class="fa-brands fa-facebook-f"></i>
Facebook Page
</a>

<a href="https://m.me" class="btn" target="_blank">
<i class="fa-brands fa-facebook-messenger"></i>
Messenger
</a>

<a href="mailto:office@example.com" class="btn">
<i class="fa-solid fa-envelope"></i>
Email Office
</a>

<a href="vcard.vcf" class="btn">
<i class="fa-solid fa-download"></i>
Save Contact
</a>

<div class="footer">
Official Digital Contact Card<br>
Mayor Zyrex C. Pacquiao
</div>

</div>

</body>
</html>
